name: Export all Neo agents

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Export all agents
        env:
          NEO_API_KEY: ${{ secrets.NEO_API_KEY }}
          NEO_BASE_URL: ${{ secrets.NEO_BASE_URL }}
        run: |
          python scripts/export_all_neo_agents.py \
            --out neo-backup \
            --include-versions

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: neo/export-all-agents
          title: "Backup all Neo agents"
          commit-message: "Backup all Neo agents"
          body: "Automated export of all Neo agents, snapshots, versions, summaries, and extracted multiline instructions."
          add-paths: |
            neo-backup/**
